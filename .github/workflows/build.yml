name: Build Nekogram APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: '17'

    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper/
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-

    - name: Build Release APK
      run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=/dev/null

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: nekogram-apk
        path: app/build/outputs/apk/release/*.apk
